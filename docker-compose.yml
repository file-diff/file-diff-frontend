services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        VITE_GIT_COMMIT: ${VITE_GIT_COMMIT:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://filediff.org/api}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - API_BASE_URL=${API_BASE_URL:-https://filediff.org/api}
    restart: unless-stopped
