services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        VITE_GIT_COMMIT: ${VITE_GIT_COMMIT:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://filediff.org/api}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - API_BASE_URL=${API_BASE_URL:-https://filediff.org/api}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - redis
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    restart: unless-stopped
